services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_comic_workbench
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_comic_workbench"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_PROXY_TARGET: http://api:8787
        NEXT_PUBLIC_RECHARGE_WECHAT_QR_URL: ${NEXT_PUBLIC_RECHARGE_WECHAT_QR_URL:-}
        NEXT_PUBLIC_RECHARGE_ALIPAY_QR_URL: ${NEXT_PUBLIC_RECHARGE_ALIPAY_QR_URL:-}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    image: ai-comic-workbench:prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.cvm
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-change-me-before-production}@postgres:5432/ai_comic_workbench
      STORAGE_PROVIDER: local
    command: sh -c "npx prisma migrate deploy && npx tsx server/main.ts"
    volumes:
      - media-data:/app/server/storage/media
    ports:
      - "127.0.0.1:8787:8787"

  web:
    image: ai-comic-workbench:prod
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env.cvm
    environment:
      API_PROXY_TARGET: http://api:8787
      API_PROXY_TIMEOUT_MS: 900000
    command: npx next start -H 0.0.0.0 -p 5173
    ports:
      - "127.0.0.1:5173:5173"

volumes:
  postgres-data:
  media-data:
