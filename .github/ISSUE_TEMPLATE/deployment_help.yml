name: Deployment help
description: 请求自托管、数据库、存储或 Provider 配置方面的帮助
title: "[Deploy]: "
labels:
  - question
  - deployment
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        请先移除 API key、Cookie、密码、邮箱、私有域名和用户内容。一般使用问题也可以在 Discussions 的 Q&A 分类中交流。
  - type: dropdown
    id: deployment
    attributes:
      label: 部署方式
      options:
        - Docker Compose
        - 本地 Node.js
        - 腾讯云 CVM
        - 其他云主机或容器平台
        - 不确定
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: 版本或提交
      placeholder: v0.1.0、commit SHA 或分支名
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 填写操作系统、CPU 架构、Node.js、Docker 和反向代理版本。
      placeholder: Ubuntu 24.04 / x86_64 / Node.js 22 / Docker 28 / Nginx
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: 数据库
      options:
        - Local JSON
        - PostgreSQL
        - 不确定
    validations:
      required: true
  - type: dropdown
    id: storage
    attributes:
      label: 媒体存储
      options:
        - Local disk
        - S3-compatible storage
        - 不确定
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: AI Provider 状态
      options:
        - Mock 模式
        - OpenAI / OpenAI-compatible
        - Moonshot / Kimi
        - Seedance / Volcengine Ark
        - 多 Provider 混合
        - 尚未配置或不确定
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题与目标
      description: 描述当前现象、期望结果以及已经尝试过的步骤。
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: 已脱敏配置摘要
      description: 只列出变量名和非敏感模式；密钥请写成 configured/unconfigured，不要填写真实值。
      placeholder: |
        APP_ENV=production
        DATABASE_URL=configured
        OPENAI_API_KEY=configured
        OPENAI_MOCK=false
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 已脱敏日志
      description: 请保留错误时间、状态码和堆栈；删除密钥、令牌、Cookie、邮箱、项目内容和存储 URL。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已查看 README 和相关部署文档。
          required: true
        - label: 我确认该 Issue 不包含密钥、私人数据或可直接利用的安全漏洞细节。
          required: true
